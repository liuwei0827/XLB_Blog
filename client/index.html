<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>十块钱小笼包 — 美食与生活的温暖记录</title>
  <meta name="description" content="记录平凡生活里的温暖味道，探寻城市角落里的感动瞬间。" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🥟</text></svg>" />
  <link rel="stylesheet" href="/css/style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=Noto+Sans+SC:wght@300;400;500&display=swap" rel="stylesheet" />
</head>
<body>

<!-- ===== 顶部导航栏 ===== -->
<header class="site-header" id="site-header">
  <div class="header-inner">
    <a class="logo" href="/" data-link="/">
      <span class="logo-icon">🥟</span>
      <div class="logo-text">
        <span class="logo-title">十块钱小笼包</span>
        <span class="logo-sub">美食与生活的温暖记录</span>
      </div>
    </a>
    <nav class="main-nav">
      <a class="nav-link" href="/"        data-link="/">首页</a>
      <a class="nav-link" href="/archive" data-link="/archive">归档</a>
      <a class="nav-link" href="/about"   data-link="/about">关于</a>
      <a class="nav-link nav-admin" href="/admin" data-link="/admin" id="admin-nav-link">后台</a>
    </nav>
    <div class="header-actions">
      <button class="btn-search" id="btn-search" aria-label="搜索">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
        </svg>
      </button>
      <button class="btn-menu" id="btn-menu" aria-label="菜单">
        <span></span><span></span><span></span>
      </button>
    </div>
  </div>
</header>

<!-- ===== 搜索浮层 ===== -->
<div class="search-overlay" id="search-overlay">
  <div class="search-box">
    <input type="text" id="search-input" placeholder="搜索文章、标签..." autocomplete="off" />
    <button id="btn-search-close" aria-label="关闭搜索">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
      </svg>
    </button>
  </div>
  <div class="search-results" id="search-results"></div>
</div>

<!-- ===== 主内容区：由 JS 渲染 ===== -->
<main id="app" role="main">
  <!-- 初始加载占位 -->
  <div class="loading" style="min-height:100vh"></div>
</main>

<!-- ===== 页脚 ===== -->
<footer class="site-footer">
  <div class="footer-inner">
    <div class="footer-brand">
      <span class="logo-icon">🥟</span>
      <p>十块钱小笼包</p>
      <small>记录平凡生活里的温暖味道</small>
    </div>
    <div class="footer-links">
      <div class="footer-col">
        <h4>导航</h4>
        <a href="/"        data-link="/">首页</a>
        <a href="/archive" data-link="/archive">归档</a>
        <a href="/about"   data-link="/about">关于</a>
      </div>
      <div class="footer-col">
        <h4>分类</h4>
        <div id="footer-categories"></div>
      </div>
    </div>
  </div>
  <div class="footer-bottom">
    <p>© 2024 十块钱小笼包 · 用美食记录生活</p>
  </div>
</footer>

<!-- Toast 通知 -->
<div class="toast" id="toast" role="status" aria-live="polite"></div>

<!--
  marked.js：Markdown 渲染，通过 CDN 加载以避免打包
  如果后续引入构建工具，可替换为 npm install marked
-->
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

<!-- 应用入口：ES Module -->
<script type="module" src="/js/app.js"></script>
</body>
</html>
